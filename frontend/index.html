<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ERP PO System</title>
    <meta name="description" content="Purchase Orders Dashboard - View and manage all purchase orders">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand navbar-dark main-nav">
        <div class="container-fluid">
            <a class="navbar-brand brand-text" href="index.html">
                <svg width="28" height="28" viewBox="0 0 48 48" fill="none" class="me-2">
                    <rect width="48" height="48" rx="12" fill="url(#grad2)"/>
                    <path d="M14 24L22 32L34 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="grad2" x1="0" y1="0" x2="48" y2="48">
                            <stop offset="0%" stop-color="#6366f1"/>
                            <stop offset="100%" stop-color="#8b5cf6"/>
                        </linearGradient>
                    </defs>
                </svg>
                ERP PO System
            </a>
            <div class="nav-links">
                <a href="index.html" class="btn btn-nav active" id="navDashboard">Dashboard</a>
                <a href="create-po.html" class="btn btn-nav" id="navCreatePO">Create PO</a>
                <button class="btn btn-logout" id="logoutBtn" onclick="logout()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="me-1">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="page-header">
            <div>
                <h1 class="page-title">Purchase Orders</h1>
                <p class="page-subtitle">Manage and track all your purchase orders</p>
            </div>
            <a href="create-po.html" class="btn btn-primary btn-create" id="createPOBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="me-1">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Create New PO
            </a>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Loading purchase orders...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state d-none">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            <h3>No Purchase Orders Yet</h3>
            <p>Create your first purchase order to get started</p>
            <a href="create-po.html" class="btn btn-primary">Create Purchase Order</a>
        </div>

        <!-- PO Table -->
        <div id="tableContainer" class="table-card d-none">
            <table class="table table-hover mb-0" id="poTableWrapper">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Reference</th>
                        <th>Vendor</th>
                        <th>Total (₹)</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="poTable">
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
